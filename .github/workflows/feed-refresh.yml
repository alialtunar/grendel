name: feed-refresh

# Keeps the GitHub-hosted attack feed fresh from garak's Apache-2.0 corpora, so users get new
# attacks via `grendel update` without anyone installing garak or hand-editing packs. Runs weekly
# (and on demand); if anything new is found it opens a PR for a human to merge.

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install grendel + garak
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[corpora]"
      - name: Refresh the feed from garak
        run: python scripts/refresh_feed.py
      - name: Commit straight to master if the feed changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feeds/
          git diff --cached --quiet && { echo "no new attacks"; exit 0; }
          git commit -m "chore(feed): refresh attacks from garak [skip ci]"
          git push
