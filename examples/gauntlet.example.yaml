# Example gauntlet config. API keys are referenced by env-var name, never stored here.
version: 1

log:
  level: INFO
  format: text

run:
  output_dir: runs
  max_tokens: 512
  temperature: 0.0
  request_timeout_s: 30.0

# Register custom providers purely in config (no code change required).
providers:
  my-local:
    base_url: http://localhost:8000/v1
    api_style: openai
    api_key_env: MY_LOCAL_API_KEY

targets:
  # A built-in OpenAI preset target.
  gpt:
    provider: openai
    model: gpt-4o-mini

  # A generic OpenAI-compatible endpoint behind a user base_url.
  local-compat:
    provider: openai-compatible
    model: my-model
    base_url: http://localhost:1234/v1

  # A target using the config-registered custom provider above.
  custom:
    provider: my-local
    model: custom-model
